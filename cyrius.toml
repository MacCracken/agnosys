name = "agnosys"
version = "0.97.1"
license = "GPL-3.0-only"
entry = "src/main.cyr"
output = "agnosys"
description = "agnosys — AGNOS kernel interface library, Cyrius port"

# agnosys is a leaf library — no external deps.
# Consumers include only the modules they need:
#
#   [deps.agnosys]
#   path = "../agnosys"
#   modules = ["src/error.cyr", "src/syscall.cyr", "src/security.cyr"]
#
# Available modules (20):
#   src/error.cyr      src/syscall.cyr    src/logging.cyr    src/security.cyr
#   src/mac.cyr        src/audit.cyr      src/pam.cyr        src/journald.cyr
#   src/luks.cyr       src/dmverity.cyr   src/ima.cyr        src/tpm.cyr
#   src/certpin.cyr    src/secureboot.cyr src/udev.cyr       src/drm.cyr
#   src/netns.cyr      src/bootloader.cyr src/update.cyr     src/fuse.cyr
