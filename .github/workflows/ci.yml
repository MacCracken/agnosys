name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Verify toolchain
        run: cc5 --version

      - name: Syntax check
        run: |
          for f in src/*.cyr; do
            cyrius check "$f"
          done

      - name: API surface check
        run: scripts/check-api-surface.sh

      - name: Capacity gate
        run: cyrius capacity --check src/main.cyr

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # `cyrius.lock` has been generated and committed. Once the
        # lockfile lands in-tree, this step starts enforcing hashes.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Format check
        # cyrius fmt --check emits the formatted source; diff against the
        # committed file to enforce no drift.
        run: |
          fail=0
          for f in src/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" --check 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        # Auto-discover so new modules are covered without editing CI.
        # Treat any warning as a failure (fail on any cyrlint "  warn " line).
        run: |
          fail=0
          for f in src/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Vet (include-graph audit)
        run: cyrius vet src/main.cyr

      - name: Verify dist bundle is in sync with src/
        run: |
          cyrius distlib
          if ! git diff --quiet dist/agnosys.cyr; then
            echo "ERROR: dist/agnosys.cyr is stale. Run 'cyrius distlib' and commit the result."
            git --no-pager diff dist/agnosys.cyr | head -40
            exit 1
          fi
          echo "dist/agnosys.cyr matches src/"

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/agnosys
          echo "agnosys: $(wc -c < build/agnosys) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/agnosys | grep -q "7f45 4c46"

      - name: Cross-build aarch64
        # The toolchain translates x86_64 syscall numbers to aarch64
        # at codegen — no agnosys source changes needed. Requires
        # cc5_aarch64 in the toolchain bin dir. If the toolchain
        # release didn't bundle it, skip with a warning rather than
        # fail the whole build.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::warning::cc5_aarch64 not shipped with Cyrius $CYRIUS_VERSION — skipping aarch64 cross-build"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/agnosys-aarch64
          for f in fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build --aarch64 "$f" "build/${name}-aarch64"
          done
          for bin in build/agnosys-aarch64 build/*-aarch64; do
            [ -f "$bin" ] || continue
            file "$bin" | grep -q "aarch64" || {
              echo "ERROR: $bin is not an aarch64 ELF"; exit 1; }
          done
          echo "agnosys-aarch64: $(wc -c < build/agnosys-aarch64) bytes"

      - name: Smoke test
        run: |
          ./build/agnosys | tee /tmp/smoke_output
          grep -q "agnosys ready" /tmp/smoke_output

      - name: Integration tests
        run: |
          for t in tests/tcyr/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            CYRIUS_DCE=1 cyrius build "$t" "/tmp/ci_$name"
            "/tmp/ci_$name"
            rm -f "/tmp/ci_$name"
          done

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            timeout 10 "build/$name" 500 || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          CYRIUS_DCE=1 cyrius build tests/bcyr/bench_all.bcyr build/bench_all
          ./build/bench_all

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only — rejects patterns in # comments.
        # Use awk instead of "grep -v '# '" which would eat any line
        # with an inline comment and hide real hits.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # Raw execve(59) outside the security module's seccomp surface
          scan "raw execve"     'syscall( *59'
          # Direct shadow file access
          scan "shadow access"  '"/etc/shadow"'
          # Writes to system paths that agnosys shouldn't touch
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64KB — force heap review).
          # NB: cyrius emits `var buf[N]` in fn scope as static data,
          # not stack — the same warning the build emits for "large
          # static data". Catch it here too.
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large static buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
