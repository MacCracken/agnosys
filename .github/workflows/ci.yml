name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "3.2.6"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$HOME/.cyrius/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "Cyrius $CYRIUS_VERSION installed"

      - name: Syntax check
        run: |
          for f in src/*.cyr; do
            cyrius check "$f"
          done

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/agnosys
          echo "agnosys: $(wc -c < build/agnosys) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/agnosys | grep -q "7f45 4c46"

      - name: Smoke test
        run: |
          ./build/agnosys | tee /tmp/smoke_output
          grep -q "agnosys ready" /tmp/smoke_output

      - name: Integration tests
        run: cyrius test

      - name: Lint
        run: |
          for f in src/*.cyr; do
            cyrius lint "$f"
          done

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .fcyr)
            cyrius build "$f" "build/$name"
            timeout 10 "build/$name" 500 || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          cyrius build tests/bench_all.bcyr build/bench_all
          ./build/bench_all

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          # Check for raw execve outside process.cyr
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# " | grep -v process; then
            echo "WARN: raw execve in agnosys modules"; WARN=1
          fi
          # Check for direct shadow file access
          if grep -rn '"/etc/shadow"' src/ 2>/dev/null; then
            echo "WARN: direct shadow file access"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.toml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TOML_VERSION=$(grep '^version = ' cyrius.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          [ "$FILE_VERSION" = "$TOML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.toml ($TOML_VERSION)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "version not in changelog"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
