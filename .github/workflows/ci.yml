name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "1.7.3"

jobs:
  # ── Build ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/cc2" ./build/cc2
          cp "$CYRIUS_HOME/bin/cyrb" ./build/cyrb
          chmod +x ./build/cc2 ./build/cyrb
          echo "Cyrius $CYRIUS_VERSION installed"

      - name: Build agnosys
        run: |
          ./build/cyrb build src/main.cyr build/agnosys
          echo "binary: $(wc -c < build/agnosys) bytes"

      - name: Smoke test
        run: |
          ./build/agnosys | tee /tmp/smoke_output
          grep -q "agnosys ready" /tmp/smoke_output

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: build/agnosys
          retention-days: 5

  # ── Check & Format ──
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/cc2" ./build/cc2
          cp "$CYRIUS_HOME/bin/cyrb" ./build/cyrb
          chmod +x ./build/cc2 ./build/cyrb

      - name: Syntax check (entry point)
        run: |
          ./build/cyrb check src/main.cyr
          echo "PASS: src/main.cyr"

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for dangerous patterns
        run: |
          WARN=0
          # Check for raw execve outside process.cyr
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# " | grep -v process; then
            echo "WARN: raw execve in agnosys modules"
            WARN=1
          fi
          # Check for hardcoded paths that bypass validation
          if grep -rn '"/etc/shadow"' src/ 2>/dev/null; then
            echo "WARN: direct shadow file access"
            WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  # ── Tests ──
  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/cc2" ./build/cc2
          cp "$CYRIUS_HOME/bin/cyrb" ./build/cyrb
          chmod +x ./build/cc2 ./build/cyrb

      - name: Run test suite
        run: |
          if [ -f scripts/test.sh ]; then
            sh scripts/test.sh
          else
            # Build and run main as integration test
            ./build/cyrb build src/main.cyr build/agnosys
            OUTPUT=$(./build/agnosys 2>&1)
            echo "$OUTPUT"
            echo "$OUTPUT" | grep -q "agnosys ready"
            echo "PASS: integration test"
          fi

  # ── Benchmarks ──
  benchmarks:
    name: Benchmarks
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          export CYRIUS_HOME="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_HOME/bin/cc2" ./build/cc2
          cp "$CYRIUS_HOME/bin/cyrb" ./build/cyrb
          chmod +x ./build/cc2 ./build/cyrb

      - name: Run benchmarks
        run: |
          if [ -f scripts/bench-history.sh ]; then
            sh scripts/bench-history.sh
          fi
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmarks
          path: |
            bench-history.csv
            BENCHMARKS.md
          retention-days: 90

  # ── Documentation ──
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE; do
            if [ -f "$doc" ]; then
              echo "  OK: $doc"
            else
              echo "  MISSING: $doc"
              MISSING=1
            fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent"
