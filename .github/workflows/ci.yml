name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "5.2.0"  # honored by install.sh; sets active toolchain

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sSfL https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
      - name: Verify toolchain
        run: cc5 --version

      - name: Syntax check
        run: |
          for f in src/*.cyr; do
            cyrius check "$f"
          done

      - name: API surface check
        run: scripts/check-api-surface.sh

      - name: Capacity gate
        run: cyrius capacity --check src/main.cyr

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/agnosys
          echo "agnosys: $(wc -c < build/agnosys) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/agnosys | grep -q "7f45 4c46"

      - name: Smoke test
        run: |
          ./build/agnosys | tee /tmp/smoke_output
          grep -q "agnosys ready" /tmp/smoke_output

      - name: Resolve dependencies
        run: cyrius deps

      - name: Integration tests
        run: |
          for t in tests/tcyr/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            cyrius build "$t" "/tmp/ci_$name"
            "/tmp/ci_$name"
            rm -f "/tmp/ci_$name"
          done

      - name: Lint
        run: |
          for f in src/*.cyr; do
            cyrius lint "$f"
          done

      - name: Vet (include-graph audit)
        run: cyrius vet src/main.cyr

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .fcyr)
            cyrius build "$f" "build/$name"
            timeout 10 "build/$name" 500 || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          cyrius build tests/bcyr/bench_all.bcyr build/bench_all
          ./build/bench_all

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          # Check for raw execve outside process.cyr
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# " | grep -v process; then
            echo "WARN: raw execve in agnosys modules"; WARN=1
          fi
          # Check for direct shadow file access
          if grep -rn '"/etc/shadow"' src/ 2>/dev/null; then
            echo "WARN: direct shadow file access"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || { echo "cyrius.cyml version must be \${file:VERSION} — VERSION is source of truth"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "version not in changelog"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
