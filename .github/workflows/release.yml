name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml ($CARGO_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [VERSION]" until the next "## [" or EOF
          BODY=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            echo "WARNING: No CHANGELOG entry found for $VERSION"
            BODY="No changelog entry for this release."
          fi
          # Write to file to preserve multiline content
          echo "$BODY" > /tmp/release-body.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "agnosys ${{ github.ref_name }}"
          body_path: /tmp/release-body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
