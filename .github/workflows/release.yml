name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write

env:
  CYRIUS_VERSION: "5.2.0"  # honored by install.sh; sets active toolchain

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || { echo "cyrius.cyml version must be \${file:VERSION}"; exit 1; }

      - name: Install Cyrius toolchain
        run: |
          curl -sSfL https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          cyrius --version

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/agnosys
          echo "agnosys: $(wc -c < build/agnosys) bytes"

      - name: Test
        run: cyrius test

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="agnosys-${TAG}/" -o "agnosys-${TAG}-src.tar.gz" HEAD
          sha256sum agnosys-*.tar.gz > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            agnosys-*.tar.gz
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        run: awk "/^## \\[${GITHUB_REF_NAME}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "agnosys ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            agnosys-*.tar.gz
            SHA256SUMS
